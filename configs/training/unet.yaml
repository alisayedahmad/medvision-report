data:
  data_dir: data/sample
  labels_csv: data/sample/sample_labels.csv
  image_size: 224
  use_clahe: true
  use_lung_mask: false

split:
  val_fraction: 0.15
  seed: 42

model:
  num_classes: 14
  encoder_name: tu-convnext_tiny
  pretrained: true

training:
  batch_size: 4              # smaller than DINOv2 - full fine-tune uses more memory
  grad_accum_steps: 4        # effective batch = 16
  num_epochs: 20
  learning_rate: 1.0e-4      # lower LR for full fine-tuning
  weight_decay: 1.0e-4
  num_workers: 4
  mixed_precision: true

logging:
  checkpoint_dir: checkpoints/unet_convnext
  log_every_n_steps: 50
