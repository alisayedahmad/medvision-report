data:
  data_dir: data/sample
  labels_csv: data/sample/sample_labels.csv
  image_size: 224
  use_clahe: true
  use_lung_mask: false  # off for classification, mask can hide small findings

split:
  val_fraction: 0.15
  seed: 42

model:
  num_classes: 14
  lora_rank: 8
  lora_alpha: 16

training:
  batch_size: 8
  grad_accum_steps: 2       # effective batch = 16 on a 4GB GPU
  num_epochs: 20
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  num_workers: 4
  mixed_precision: true

logging:
  checkpoint_dir: checkpoints/dinov2_lora
  log_every_n_steps: 50
